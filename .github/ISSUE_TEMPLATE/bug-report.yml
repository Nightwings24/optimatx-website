name: Bug report
description: Something on the site is broken or looks wrong
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What's wrong?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: input
    id: where
    attributes:
      label: Where? (page URL)
      placeholder: https://nightwings24.github.io/optimatx-website/...
  - type: input
    id: env
    attributes:
      label: Browser / device
      placeholder: e.g. Chrome on Android
