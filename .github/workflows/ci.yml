name: CI

# Typecheck + build on every pull request and on pushes to non-main branches,
# so a broken change is caught before it can reach the live deploy. (Pushes to
# main are built + deployed by deploy.yml.)
on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build (static export)
        run: npm run build
